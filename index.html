<body>
    <div id="wrapper">
        <header id="maintitle">
            Orange Diff
        </header>
        <hr>
        <main>
            <h3>Primitive Pic Difference Generator</h3>
            <form class="flex-row-container" action="javascript:submitDiff();">
                <div class="flex-row-group">
                    <div class="flex-row">
                        <p>Image A URL:</p>
                        <input type="url" class="img-txt" id="img-txt-a">
                    </div>
                    <div class="flex-row">
                        <p>Image B URL:</p>
                        <input type="url" class="img-txt" id="img-txt-b">
                    </div>
                </div>
                <div class="flex-row-group">
                    <div clas="flex-row">
                        <input type="submit" value="View Difference">
                    </div>
                </div>
            </form>
        </main>
    </div>
    <div id="post-diff-wrapper" class="post-diff-wrapper">
        <h4>Mouse over for Image B. Mouse Out for Image A.</h4>
        <div class="diffcontainer">
            <img class="img-a" id="img-a">
            <img class="img-b" id="img-b">
        </div>
        <button onclick="window.location.search += '&nogen=true';">Go Back</button>
    </div>
</body>
